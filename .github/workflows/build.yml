name: Build MediaForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            python3 \
            python3-pip \
            python3-yaml \
            python3-numpy

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Python sidecar tests
        run: python3 tests/test_sidecar.py

      - name: Build Python sidecar binary
        run: |
          pip install pyinstaller --break-system-packages
          pip install pyyaml numpy --break-system-packages
          mkdir -p src-tauri/binaries
          cd sidecar
          pyinstaller --onefile --name sidecar main.py
          cp dist/sidecar ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Python sidecar binary
        run: |
          pip install pyinstaller pyyaml numpy
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          cd sidecar
          pyinstaller --onefile --name sidecar main.py
          Copy-Item dist/sidecar.exe ../src-tauri/binaries/sidecar-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
