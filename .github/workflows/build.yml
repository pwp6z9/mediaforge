name: Build MediaForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            python3 \
            python3-pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Python sidecar deps
        run: |
          sudo apt-get install -y cmake
          pip install pyinstaller || pip install pyinstaller --break-system-packages
          pip install mutagen pyyaml watchdog numpy Pillow || pip install mutagen pyyaml watchdog numpy Pillow --break-system-packages
          pip install opencv-python-headless || pip install opencv-python-headless --break-system-packages || true
          pip install face_recognition || pip install face_recognition --break-system-packages || true

      - name: Run Python sidecar tests
        run: python3 tests/test_sidecar.py
        continue-on-error: true

      - name: Build Python sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cd sidecar
          pyinstaller --onefile --name sidecar \
            --hidden-import=mutagen \
            --hidden-import=mutagen.mp3 \
            --hidden-import=mutagen.mp4 \
            --hidden-import=mutagen.flac \
            --hidden-import=mutagen.oggvorbis \
            --hidden-import=mutagen.oggopus \
            --hidden-import=mutagen.wavpack \
            --hidden-import=mutagen.asf \
            --hidden-import=mutagen.aac \
            --hidden-import=yaml \
            main.py
          cp dist/sidecar ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu
          chmod +x ../src-tauri/binaries/sidecar-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Python sidecar deps
        run: |
          pip install pyinstaller
          pip install mutagen pyyaml watchdog numpy Pillow
          pip install opencv-python-headless || exit 0
          pip install face_recognition || exit 0

      - name: Build Python sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          cd sidecar
          pyinstaller --onefile --name sidecar `
            --hidden-import=mutagen `
            --hidden-import=mutagen.mp3 `
            --hidden-import=mutagen.mp4 `
            --hidden-import=mutagen.flac `
            --hidden-import=mutagen.oggvorbis `
            --hidden-import=mutagen.oggopus `
            --hidden-import=mutagen.wavpack `
            --hidden-import=mutagen.asf `
            --hidden-import=mutagen.aac `
            --hidden-import=yaml `
            main.py
          Copy-Item dist/sidecar.exe ../src-tauri/binaries/sidecar-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: MediaForge Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}

            ## Downloads
            - **Windows**: Download the `.exe` (NSIS installer) or `.msi` file
            - **Linux**: Download the `.AppImage` or `.deb` file

            ## Changes
            - Added comprehensive logging infrastructure (Rust + Python)
            - Fixed 7 critical bugs preventing app launch
            - Frontend retry logic for backend connection
          draft: false
          prerelease: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
